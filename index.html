<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>少羽牛逼</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
    height: 100%;
}

/* 竖屏提示 */
#rotate-message {
    position: fixed;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 8vw;
    color: white;
}

/* 横屏容器 */
#scroll-container {
    display: none;
    width: 100%;
    height: 100vh;
    overflow: hidden;
}

/* 跑马灯轨道 */
.marquee {
    display: flex;
    height: 100vh;
    align-items: center;
    white-space: nowrap;
}

/* 超大字 */
.marquee span {
    font-size: 100vh;
    line-height: 1;
    font-weight: bold;
    background: linear-gradient(90deg,#ff00cc,#00ffff,#ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    padding-right: 5vw;
}

/* 真正无缝动画 */
.marquee-track {
    display: flex;
    animation: scroll 20s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}
</style>
</head>

<body>

<div id="rotate-message">
    请把手机横过来
</div>

<div id="scroll-container">
    <div class="marquee">
        <div class="marquee-track">
            <span>少羽牛逼666</span>
            <span>少羽牛逼666</span>
            <span>少羽牛逼666</span>
            <span>少羽牛逼666</span>

            <!-- 复制一组用于无缝 -->
            <span>少羽牛逼666</span>
            <span>少羽牛逼666</span>
            <span>少羽牛逼666</span>
            <span>少羽牛逼666</span>
        </div>
    </div>
</div>

<script>
function checkOrientation() {
    if (window.matchMedia("(orientation: landscape)").matches) {
        document.getElementById("rotate-message").style.display = "none";
        document.getElementById("scroll-container").style.display = "block";
    } else {
        document.getElementById("rotate-message").style.display = "flex";
        document.getElementById("scroll-container").style.display = "none";
    }
}

checkOrientation();
window.addEventListener("orientationchange", checkOrientation);
window.addEventListener("resize", checkOrientation);
</script>

</body>
</html>
