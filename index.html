<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>！神秘惊喜！</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
    height: 100%;
}

/* 竖屏提示 */
#rotate-message {
    position: fixed;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 8vw;
    color: white;
}

/* 横屏容器 */
#scroll-container {
    display: none;
    width: 100%;
    height: 100vh;
    overflow: hidden;
}

/* 跑马灯轨道 */
.marquee {
    display: flex;
    align-items: center;
    height: 100vh;
    white-space: nowrap;
}

.marquee-track {
    display: flex;
}

/* 超大字 */
.marquee span {
    font-size: 100vh;
    line-height: 1;
    font-weight: bold;
    padding-right: 5vw;
    background: linear-gradient(90deg,#ff00cc,#00ffff,#ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
</style>
</head>

<body>

<div id="rotate-message">
    请把手机横过来
</div>

<div id="scroll-container">
    <div class="marquee">
        <div class="marquee-track" id="track">
            <span>少羽牛逼666</span>
        </div>
    </div>
</div>

<script>
function checkOrientation() {
    if (window.matchMedia("(orientation: landscape)").matches) {
        document.getElementById("rotate-message").style.display = "none";
        document.getElementById("scroll-container").style.display = "block";
        startMarquee();
    } else {
        document.getElementById("rotate-message").style.display = "flex";
        document.getElementById("scroll-container").style.display = "none";
    }
}

function startMarquee() {
    const track = document.getElementById("track");

    // 先清空之前复制的
    track.innerHTML = "<span>少羽牛逼666</span>";

    const originalWidth = track.scrollWidth;
    const screenWidth = window.innerWidth;

    // 自动复制直到超过屏幕两倍
    while (track.scrollWidth < screenWidth * 2) {
        track.innerHTML += "<span>少羽牛逼666</span>";
    }

    let position = 0;
    const speed = 2.5; // 数字越小越慢

    function animate() {
        position -= speed;
        if (Math.abs(position) >= originalWidth) {
            position = 0;
        }
        track.style.transform = `translateX(${position}px)`;
        requestAnimationFrame(animate);
    }

    animate();
}

checkOrientation();
window.addEventListener("orientationchange", checkOrientation);
window.addEventListener("resize", checkOrientation);
</script>

</body>
</html>
