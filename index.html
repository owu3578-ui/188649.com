<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>少羽牛逼</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
    height: 100%;
}

/* 竖屏提示 */
#rotate-message {
    position: absolute;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 8vw;
    color: white;
    text-align: center;
}

/* 横屏容器 */
#scroll-container {
    display: none;
    width: 100%;
    height: 100vh;
    overflow: hidden;
}

/* 超级大字 */
.scroll-text {
    display: inline-block;
    white-space: nowrap;
    font-size: 100vh; /* 直接等于屏幕高度 */
    line-height: 1;
    font-weight: bold;
    background: linear-gradient(90deg, #ff00cc, #00ffff, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: scroll 6s linear infinite;
}

/* 横向滚动动画 */
@keyframes scroll {
    0% {
        transform: translateX(100%);
    }
    100% {
        transform: translateX(-100%);
    }
}
</style>
</head>

<body>

<div id="rotate-message">
    请把手机横过来
</div>

<div id="scroll-container">
    <div class="scroll-text">
        少羽牛逼666少羽牛逼666少羽牛逼666
    </div>
</div>

<script>
function checkOrientation() {
    if (window.innerWidth > window.innerHeight) {
        document.getElementById("rotate-message").style.display = "none";
        document.getElementById("scroll-container").style.display = "block";
    } else {
        document.getElementById("rotate-message").style.display = "flex";
        document.getElementById("scroll-container").style.display = "none";
    }
}

window.addEventListener("resize", checkOrientation);
window.addEventListener("load", checkOrientation);
</script>

</body>
</html>
