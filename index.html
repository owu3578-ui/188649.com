<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>少羽牛逼</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
    height: 100%;
}

/* 竖屏提示 */
#rotate-message {
    position: fixed;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 8vw;
    color: white;
    text-align: center;
}

/* 横屏容器 */
#scroll-container {
    display: none;
    width: 100%;
    height: 100vh;
    overflow: hidden;
}

/* 全屏大字 */
.scroll-text {
    white-space: nowrap;
    font-size: 100vh;
    line-height: 1;
    font-weight: bold;
    background: linear-gradient(90deg, #ff00cc, #00ffff, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: scroll 6s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}
</style>
</head>

<body>

<div id="rotate-message">
    请把手机横过来
</div>

<div id="scroll-container">
    <div class="scroll-text">
        少羽牛逼666 少羽牛逼666 少羽牛逼666
    </div>
</div>

<script>
function checkOrientation() {
    if (window.matchMedia("(orientation: landscape)").matches) {
        document.getElementById("rotate-message").style.display = "none";
        document.getElementById("scroll-container").style.display = "block";
    } else {
        document.getElementById("rotate-message").style.display = "flex";
        document.getElementById("scroll-container").style.display = "none";
    }
}

// 初始检测
checkOrientation();

// 监听方向变化
window.addEventListener("orientationchange", checkOrientation);
window.addEventListener("resize", checkOrientation);

// 每0.5秒强制检测一次（防止某些浏览器不触发）
setInterval(checkOrientation, 500);
</script>

</body>
</html>
